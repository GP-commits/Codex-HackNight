# Luanti Edu - Default Configuration

# Always start in single-player local tab
maintab_LAST = local

# Creative mode ON - students get all blocks freely
creative_mode = true

# No damage - education platform, not survival
enable_damage = false

# Peaceful - no monsters ever
only_peaceful_mobs = true

# Always daytime
time_speed = 0

# Give all players diamond tools + robot spawner + all coding blocks on join
give_initial_stuff = true
