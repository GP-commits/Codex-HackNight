# Luanti Edu - Default Configuration
# Always start in Luanti Edu game, single-player focused

# Force this game as the only option
maintab_LAST = local

# Creative mode on so students can always get blocks
creative_mode = true

# No damage - this is an education platform
enable_damage = false

# Disable hunger/survival mechanics
enable_hunger = false

# Peaceful - no monsters
only_peaceful_mobs = true

# Start with daylight, no dynamic day/night needed for learning
time_speed = 0

# Give players good default controls
free_move = true
